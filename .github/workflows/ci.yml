name: Enterprise RAG CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Grab the code from the repository
    - name: Checkout Code
      uses: actions/checkout@v4
      
    # 2. Set up an isolated Python environment on GitHub's cloud computers
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        
    # 3. Simulate the Docker installation process
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest
        
    # 4. Automatically run our architecture checks!
    - name: Run Architecture Tests
      run: |
        pytest tests/
